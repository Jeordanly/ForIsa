<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>next to normal · just for isa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@200;300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
  :root {
    --cream: #F9F5EE;
    --cream-deep: #F0E9DC;
    --ink: #1C1714;
    --ink-faded: #4A3F35;
    --ink-ghost: #9A8E82;
    --purple: #C4A9DE;
    --purple-deep: #8B6AB5;
    --purple-pale: #EAE0F5;
    --gold: #C9A96E;
    --gold-pale: #E8D5B0;
    --vinyl: #C4A9DE;
    --vinyl-groove: #B090D0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.6;
  }

  /* ── WELCOME ── */
  #welcome {
    position: fixed;
    inset: 0;
    background: #C4A9DE;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 1.2s ease, visibility 1.2s ease;
    padding: 2rem;
  }

  #welcome.fade-out { opacity: 0; visibility: hidden; }

  .welcome-vinyl {
    width: 70px; height: 70px;
    border-radius: 50%;
    background: #8B6AB5;
    border: 8px solid #7A5AA5;
    box-shadow: 0 0 0 3px #9E7EC8, 0 0 0 6px #B090D0, 0 0 0 9px #C4A9DE;
    margin-bottom: 2.2rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.1s forwards, spinSlow 4s linear infinite;
    position: relative;
  }

  .welcome-vinyl::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
  }

  .welcome-pre {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 4vw, 1.2rem);
    font-weight: 300;
    font-style: italic;
    color: rgba(28,23,20,0.55);
    letter-spacing: 0.08em;
    opacity: 0;
    animation: fadeUp 0.8s 0.5s forwards;
    margin-bottom: 0.5rem;
    text-align: center;
  }

  .welcome-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 10vw, 4rem);
    font-weight: 300;
    font-style: italic;
    color: #1C1714;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
    text-align: center;
    line-height: 1.1;
  }

  .welcome-tagline {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: clamp(0.72rem, 3vw, 0.85rem);
    color: rgba(28,23,20,0.5);
    letter-spacing: 0.06em;
    opacity: 0;
    animation: fadeUp 0.8s 1.3s forwards;
    margin-top: 1rem;
    text-align: center;
    max-width: 280px;
    line-height: 1.6;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spinSlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ── MAIN LAYOUT ── */
  .page {
    max-width: 420px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
    opacity: 0;
    animation: pageFadeIn 1s 3.8s forwards;
  }

  @keyframes pageFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .top-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
  }

  .show-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-ghost);
  }

  .for-her {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.82rem;
    color: var(--purple-deep);
  }

  /* ── RECORD PLAYER ── */
  .player-wrap {
    position: relative;
    margin: 0 auto 2.5rem;
    width: 100%;
    max-width: 320px;
  }

  .tonearm-wrap {
    position: absolute;
    top: -8px; right: -12px;
    width: 90px; height: 90px;
    transform-origin: 82px 8px;
    transform: rotate(-22deg);
    transition: transform 0.8s cubic-bezier(0.4,0,0.2,1);
    z-index: 10;
  }

  .tonearm-wrap.playing { transform: rotate(0deg); }

  .tonearm-svg { width: 100%; height: 100%; }

  .vinyl-disc {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 50%;
    position: relative;
  }

  .vinyl-disc.spinning { animation: spinVinyl 3s linear infinite; }
  .vinyl-disc.slowing  { animation: spinVinyl 8s linear infinite; }

  @keyframes spinVinyl {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ── TRACK INFO ── */
  .track-info {
    text-align: center;
    margin-bottom: 1.8rem;
    min-height: 60px;
  }

  .track-num {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--purple-deep);
    margin-bottom: 0.4rem;
  }

  .track-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.55rem;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.2;
    transition: opacity 0.3s ease;
  }

  .track-credit {
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--ink-ghost);
    letter-spacing: 0.06em;
    margin-top: 0.3rem;
  }

  /* ── PROGRESS ── */
  .progress-wrap { margin-bottom: 1.5rem; }

  .progress-times {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--ink-ghost);
    margin-bottom: 0.4rem;
  }

  .progress-bar {
    width: 100%; height: 1px;
    background: rgba(26,22,18,0.12);
    border-radius: 1px;
    cursor: pointer;
    position: relative;
    overflow: visible;
  }

  .progress-fill {
    height: 100%;
    background: var(--purple-deep);
    border-radius: 1px;
    width: 0%;
    transition: width 0.5s linear;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -3px; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--purple-deep);
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2rem;
  }

  .ctrl-btn {
    background: none; border: none;
    cursor: pointer;
    color: var(--ink-faded);
    padding: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, transform 0.15s;
  }

  .ctrl-btn:hover { color: var(--purple-deep); }
  .ctrl-btn:active { transform: scale(0.88); }
  .ctrl-btn.active { color: var(--purple-deep); }

  .play-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--purple-deep);
    color: white;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s;
    box-shadow: 0 4px 20px rgba(139,106,181,0.35);
  }

  .play-btn:hover { background: #7A5AA5; }
  .play-btn:active { transform: scale(0.92); }

  /* ── TRACKLIST ── */
  .tracklist-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .tracklist-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-ghost);
    white-space: nowrap;
  }

  .tracklist-line {
    flex: 1; height: 0.5px;
    background: rgba(26,22,18,0.1);
  }

  .tracklist { list-style: none; }

  .track-item {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.55rem 4px;
    border-bottom: 0.5px solid rgba(26,22,18,0.06);
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 4px;
  }

  .track-item:hover { background: rgba(196,169,222,0.08); }
  .track-item:last-child { border-bottom: none; }

  .track-item.active .ti-name {
    color: var(--purple-deep);
    font-style: italic;
  }

  .track-item.active .ti-num { color: var(--purple-deep); }

  .ti-num {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--ink-ghost);
    width: 18px;
    flex-shrink: 0;
    text-align: right;
  }

  .ti-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    color: var(--ink-faded);
    flex: 1;
    line-height: 1.3;
    transition: color 0.2s;
  }

  .ti-heart {
    background: none; border: none;
    cursor: pointer;
    padding: 2px 4px;
    opacity: 0.25;
    transition: opacity 0.2s, transform 0.15s;
    color: var(--purple-deep);
    font-size: 13px;
    flex-shrink: 0;
  }

  .ti-heart.loved { opacity: 1; }
  .ti-heart:active { transform: scale(1.35); }

  /* ── LOVE NOTE ── */
  .love-note-wrap {
    margin-top: 2.5rem;
    border-top: 0.5px solid rgba(196,169,222,0.4);
    padding-top: 1.5rem;
  }

  .love-note-toggle {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    background: var(--purple-pale);
    border: 0.5px solid rgba(196,169,222,0.5);
    border-radius: 10px;
    cursor: pointer;
    padding: 0.9rem 1.1rem;
    color: var(--purple-deep);
    transition: background 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  .love-note-toggle:hover {
    background: #DDD0EF;
    box-shadow: 0 2px 12px rgba(196,169,222,0.3);
  }

  .love-note-icon { font-size: 1.1rem; flex-shrink: 0; }

  .love-note-label-wrap { flex: 1; text-align: left; }

  .love-note-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    font-weight: 600;
    display: block;
    color: var(--purple-deep);
  }

  .love-note-hint {
    font-family: 'Jost', sans-serif;
    font-size: 0.7rem;
    font-weight: 300;
    color: rgba(139,106,181,0.65);
    letter-spacing: 0.04em;
  }

  .love-note-arrow {
    font-size: 0.75rem;
    transition: transform 0.3s;
    color: var(--purple-deep);
    flex-shrink: 0;
  }

  .love-note-arrow.open { transform: rotate(180deg); }

  .love-note-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease;
    opacity: 0;
  }

  .love-note-content.open { max-height: 400px; opacity: 1; }

  .love-note-inner {
    margin-top: 1rem;
    padding: 1.5rem;
    background: var(--purple-pale);
    border-radius: 10px;
    border: 0.5px solid rgba(196,169,222,0.35);
    position: relative;
  }

  .love-note-inner::before {
    content: '';
    position: absolute;
    top: -6px; left: 24px;
    width: 14px; height: 12px;
    background: var(--purple-pale);
    border-left: 0.5px solid rgba(196,169,222,0.35);
    border-top: 0.5px solid rgba(196,169,222,0.35);
    transform: rotate(45deg);
  }

  .love-note-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-style: italic;
    color: var(--ink-faded);
    line-height: 1.9;
  }

  .love-note-sig {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.88rem;
    color: var(--purple-deep);
    margin-top: 1rem;
    display: block;
    font-style: italic;
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 3rem;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.78rem;
    color: rgba(26,22,18,0.3);
    letter-spacing: 0.04em;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 2px; }

  .no-audio-note {
    font-size: 0.72rem;
    color: var(--ink-ghost);
    text-align: center;
    padding: 0.5rem;
    font-style: italic;
    display: none;
  }
</style>
</head>

<!-- WELCOME OVERLAY -->
<div id="welcome">
  <div class="welcome-vinyl"></div>
  <div class="welcome-pre">For my dearest</div>
  <div class="welcome-name" id="welcomeName">Isa</div>
  <div class="welcome-tagline">Who makes my life the next best thing from normal</div>
</div>

<!-- MAIN PAGE -->

    <span class="show-title">next to normal · 2025</span>

<script>
const CONFIG = {
  herName: "Isa",
  yourName: "Jey",
  defaultLovedTracks: [2, 9, 12],
  loveNote: `I made this because you deserve to hold this show in your hands, even if no one else in Europe thought to make the merch :P The songs you like are all here!! You've talked about them, felt them, lived them. I hope every time you tap this keychain, it feels like a tiny hug. This one's yours.`,
  labelSymbol: "♡",
  giftDate: "2025",
};

const TRACKS = [
  { num: "01", name: "Prelude",                                            credit: "Caissie Levy · Jack Wolfe", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134632/Prelude_gy3u1q.mp3" },
  { num: "02", name: "Just Another Day",                                   credit: "Next To Normal 2024 Original London Company", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134633/Just_Another_Day_rrjjva.mp3" },
  { num: "03", name: "Who's Crazy / My Psychopharmacologist and I",        credit: "Next To Normal 2024 Original London Company", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134633/Who_s_CrazyMy_Psychopharmacologist_and_I_pz2sj9.mp3" },
  { num: "04", name: "Perfect for You",                                    credit: "Eleanor Worthington-Cox · Jack Ofrecio", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134632/Perfect_for_You_gse5xf.mp3" },
  { num: "05", name: "It's Gonna Be Good",                                 credit: "Next To Normal 2024 Original London Company", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134632/It_s_Gonna_Be_Good_li62ci.mp3" },
  { num: "06", name: "He's Not Here",                                      credit: "Jamie Parker", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134649/He_s_Not_Here_bccucf.mp3" },
  { num: "07", name: "You Don't Know",                                     credit: "Caissie Levy", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134657/You_Don_t_Know_htgmth.mp3" },
  { num: "08", name: "I Am the One",                                       credit: "Jamie Parker · Caissie Levy · Jack Wolfe", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134657/I_Am_the_One_x3ps27.mp3" },
  { num: "09", name: "Superboy and the Invisible Girl",                    credit: "Eleanor Worthington-Cox · Caissie Levy · Jack Wolfe", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134656/Superboy_and_the_Invisible_Girl_kh72yn.mp3" },
  { num: "10", name: "I'm Alive",                                          credit: "Jack Wolfe", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134657/I_m_Alive_e4jzig.mp3" },
  { num: "11", name: "Hey #1",                                             credit: "Eleanor Worthington-Cox · Jack Ofrecio", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134673/Hey_1_ylui3e.mp3" },
  { num: "12", name: "Seconds and Years",                                  credit: "Trevor Dion Nicholas · Caissie Levy · Jamie Parker", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134673/Seconds_and_Years_fu7h0q.mp3" },
  { num: "13", name: "I'm Alive (Reprise)",                                credit: "Jack Wolfe", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134673/I_m_Alive_Reprise_v7nai3.mp3" },
  { num: "14", name: "Maybe (Next to Normal)",                             credit: "Eleanor Worthington-Cox · Caissie Levy", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134674/Maybe_Next_to_Normal_exovog.mp3" },
  { num: "15", name: "I Am the One (Reprise)",                             credit: "Jamie Parker · Jack Wolfe", src: "https://res.cloudinary.com/dlw0di8bz/video/upload/v1777134672/I_Am_the_One_Reprise_om1ozs.mp3" },
];

// Set love note text
document.getElementById('loveNoteText').textContent = CONFIG.loveNote;
document.getElementById('loveSig').textContent = `with all my love, ${CONFIG.yourName} ♡`;

// Loved tracks — multi-default support
const lovedKey = 'n2n_loved_v2';
const lovedInitKey = 'n2n_loved_init_v2';
const loved = new Set(JSON.parse(localStorage.getItem(lovedKey) || '[]'));
if (!localStorage.getItem(lovedInitKey)) {
  CONFIG.defaultLovedTracks.forEach(i => loved.add(i));
  localStorage.setItem(lovedInitKey, '1');
  localStorage.setItem(lovedKey, JSON.stringify([...loved]));
}

// Welcome dismiss
setTimeout(() => {
  document.getElementById('welcome').classList.add('fade-out');
}, 3800);

// State
let currentIndex = 0;
let isPlaying = false;
let isRepeat = false;
let isMuted = false;

const audio = document.getElementById('audioPlayer');
const vinylDisc = document.getElementById('vinylDisc');
const tonearm = document.getElementById('tonearm');

// Build tracklist
const tracklistEl = document.getElementById('tracklist');
TRACKS.forEach((t, i) => {
  const li = document.createElement('li');
  li.className = 'track-item' + (i === 0 ? ' active' : '');
  li.dataset.index = i;
  li.innerHTML = `
    <span class="ti-num">${t.num}</span>
    <span class="ti-name">${t.name}</span>
    <button class="ti-heart ${loved.has(i) ? 'loved' : ''}" data-index="${i}" aria-label="Love this track">♡</button>
  `;
  li.addEventListener('click', e => {
    if (e.target.classList.contains('ti-heart')) return;
    selectTrack(i, true);
  });
  li.querySelector('.ti-heart').addEventListener('click', e => {
    e.stopPropagation();
    toggleLove(i, e.currentTarget);
  });
  tracklistEl.appendChild(li);
});

function selectTrack(index, autoPlay = false) {
  currentIndex = index;
  const t = TRACKS[index];
  document.getElementById('trackNum').textContent = `${t.num} / ${TRACKS.length.toString().padStart(2,'0')}`;
  document.getElementById('trackName').textContent = t.name;
  document.getElementById('trackCredit').textContent = t.credit;
  document.querySelectorAll('.track-item').forEach((el, i) => el.classList.toggle('active', i === index));
  const activeEl = document.querySelector('.track-item.active');
  if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  if (t.src) {
    audio.src = t.src;
    document.getElementById('noAudioNote').style.display = 'none';
    if (autoPlay || isPlaying) audio.play().then(() => setPlayState(true)).catch(() => setPlayState(false));
  } else {
    audio.src = '';
    document.getElementById('noAudioNote').style.display = 'block';
    setPlayState(false);
  }
  resetProgress();
}

function setPlayState(playing) {
  isPlaying = playing;
  document.getElementById('playIcon').style.display = playing ? 'none' : 'block';
  document.getElementById('pauseIcon').style.display = playing ? 'block' : 'none';
  if (playing) {
    vinylDisc.classList.add('spinning');
    vinylDisc.classList.remove('slowing');
    tonearm.classList.add('playing');
  } else {
    vinylDisc.classList.remove('spinning');
    vinylDisc.classList.add('slowing');
    setTimeout(() => vinylDisc.classList.remove('slowing'), 2000);
    tonearm.classList.remove('playing');
  }
}

document.getElementById('playBtn').addEventListener('click', () => {
  if (isPlaying) { audio.pause(); setPlayState(false); }
  else {
    const t = TRACKS[currentIndex];
    if (t.src) {
      if (!audio.src || audio.src === window.location.href) audio.src = t.src;
      audio.play().then(() => setPlayState(true)).catch(() => {
        document.getElementById('noAudioNote').style.display = 'block';
        setPlayState(false);
      });
    } else {
      document.getElementById('noAudioNote').style.display = 'block';
    }
  }
});

document.getElementById('prevBtn').addEventListener('click', () => selectTrack((currentIndex - 1 + TRACKS.length) % TRACKS.length, isPlaying));
document.getElementById('nextBtn').addEventListener('click', () => selectTrack((currentIndex + 1) % TRACKS.length, isPlaying));

document.getElementById('repeatBtn').addEventListener('click', () => {
  isRepeat = !isRepeat;
  document.getElementById('repeatBtn').classList.toggle('active', isRepeat);
});

document.getElementById('muteBtn').addEventListener('click', () => {
  isMuted = !isMuted;
  audio.muted = isMuted;
  document.getElementById('volIcon').style.display = isMuted ? 'none' : 'block';
  document.getElementById('muteIcon').style.display = isMuted ? 'block' : 'none';
});

audio.addEventListener('ended', () => {
  if (isRepeat) { audio.currentTime = 0; audio.play(); }
  else selectTrack((currentIndex + 1) % TRACKS.length, true);
});

audio.addEventListener('timeupdate', updateProgress);
audio.addEventListener('loadedmetadata', updateProgress);

function updateProgress() {
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeElapsed').textContent = formatTime(audio.currentTime);
  document.getElementById('timeDuration').textContent = audio.duration ? formatTime(audio.duration) : '--:--';
}

function resetProgress() {
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('timeElapsed').textContent = '0:00';
  document.getElementById('timeDuration').textContent = '--:--';
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

document.getElementById('progressBar').addEventListener('click', e => {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
});

function toggleLove(index, btn) {
  if (loved.has(index)) { loved.delete(index); btn.classList.remove('loved'); }
  else { loved.add(index); btn.classList.add('loved'); }
  localStorage.setItem(lovedKey, JSON.stringify([...loved]));
}

document.getElementById('loveNoteToggle').addEventListener('click', () => {
  document.getElementById('loveNoteContent').classList.toggle('open');
  document.getElementById('loveArrow').classList.toggle('open');
});

selectTrack(0, false);

setTimeout(() => {
  const t = TRACKS[currentIndex];
  if (t.src) audio.play().then(() => setPlayState(true)).catch(() => {});
}, 4100);
</script>
</body>
</html>
